name: Build APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
    contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Accept Android SDK Licenses
      run: yes | sdkmanager --licenses || true

    - name: Install Android Build Tools
      run: sdkmanager "build-tools;34.0.0" "platforms;android-34"

    - name: Grant execute permission for gradlew
      run: chmod +x android/gradlew || true

    - name: Build Debug APK
      working-directory: android
      run: |
        ./gradlew assembleDebug --no-daemon --stacktrace
      continue-on-error: true

    - name: Build Release APK
      working-directory: android
      run: |
        ./gradlew assembleRelease --no-daemon --stacktrace
      continue-on-error: true

    - name: Check APK Output
      run: |
        echo "=== Checking APK output ==="
        ls -la android/app/build/outputs/apk/debug/ || echo "Debug APK not found"
        ls -la android/app/build/outputs/apk/release/ || echo "Release APK not found"
        echo "=== Build directory ==="
        find android/app/build -name "*.apk" 2>/dev/null || echo "No APK files found"

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Blueprint-Generator-Debug
        path: android/app/build/outputs/apk/debug/app-debug.apk
        if-no-files-found: warn

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Blueprint-Generator-Release
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk
        if-no-files-found: warn

    - name: Create Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main' && success()
      with:
        tag_name: v1.0.0
        name: Blueprint Generator v1.0.0
        body: |
          ## Blueprint Generator APK
          
          Professional Blueprint Generator for creating project blueprints.
          
          ### Features:
          - 8-Step form wizard
          - Dark/Light theme
          - Auto-save
          - File download
          - AI prompt generation
          
          ### Download:
          - **Debug APK**: For testing
          - **Release APK**: For production
        files: |
          android/app/build/outputs/apk/debug/app-debug.apk
          android/app/build/outputs/apk/release/app-release-unsigned.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
