name: Build APK

on:
  push:
    branches: [ main ]
    paths:
      - 'android/**'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
    contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Change permissions for gradlew
      run: chmod +x android/gradlew

    - name: Build Debug APK
      working-directory: android
      run: ./gradlew assembleDebug

    - name: Build Release APK
      working-directory: android
      run: ./gradlew assembleRelease

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: Blueprint-Generator-Debug
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK
      uses: actions/upload-artifact@v4
      with:
        name: Blueprint-Generator-Release
        path: android/app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Create Release
      uses: softprops/action-gh-release@v1
      if: github.ref == 'refs/heads/main'
      with:
        tag_name: v1.0.0
        name: Blueprint Generator v1.0.0
        body: |
          ## Blueprint Generator APK
          
          Professional Blueprint Generator for creating project blueprints.
          
          ### Features:
          - 8-Step form wizard
          - Dark/Light theme
          - Auto-save
          - File download
          - AI prompt generation
          
          ### Download:
          - **Debug APK**: For testing
          - **Release APK**: For production
        files: |
          android/app/build/outputs/apk/debug/app-debug.apk
          android/app/build/outputs/apk/release/app-release-unsigned.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
